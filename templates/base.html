<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}SCFP Inspection Tracker{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
{% if current_user %}
<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-row1">
      <a class="brand" href="/">Southern Cross <span>Fire Protection</span></a>
      <button type="button" class="nav-toggle" aria-label="Menu"
              onclick="document.querySelector('.topbar').classList.toggle('nav-open')">&#9776;</button>
    </div>
    <div class="topbar-collapsible">
      <nav>
        <a href="/">Dashboard</a>
        <a href="/clients">Clients</a>
        <a href="/inspections">Inspections</a>
        <a href="/service-calls">Service Calls</a>
        <a href="/users">Users</a>
      </nav>
      <form class="search-form" action="/search" method="get">
        <input type="text" name="q" placeholder="Search clients / sites…" value="{{ q|default('') }}">
      </form>
      <div class="user-menu">
        {% if current_user['role'] == 'admin' %}
        <a href="/admin/backup" title="Download a full backup of the database">Download Backup</a>
        {% endif %}
        <span>{{ current_user['name'] }}</span>
        <a href="/logout">Log out</a>
      </div>
    </div>
  </div>
</header>
{% endif %}
<main class="{% if not current_user %}auth-page{% endif %}">
{% block content %}{% endblock %}
</main>
<script src="/static/app.js"></script>
</body>
</html>
